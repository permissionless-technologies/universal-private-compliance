name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      root_release_created: ${{ steps.release.outputs.release_created }}
      whitelist_release_created: ${{ steps.release.outputs['packages/upc-asp-whitelist--release_created'] }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish-sdk:
    needs: release-please
    if: ${{ needs.release-please.outputs.root_release_created == 'true' }}
    runs-on: ubuntu-latest
    environment: npm-publish
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - run: npm run build
      - name: Publish with provenance
        run: npm publish --provenance --access public

  publish-asp-whitelist:
    needs: release-please
    if: ${{ needs.release-please.outputs.whitelist_release_created == 'true' }}
    runs-on: ubuntu-latest
    environment: npm-publish
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - run: npm run build
        working-directory: packages/upc-asp-whitelist
      - name: Publish with provenance
        run: npm publish --provenance --access public
        working-directory: packages/upc-asp-whitelist
