[profile.default]
src = "src/contracts/src"
out = "out"
libs = ["lib"]
test = "src/contracts/test"

# Compiler
solc = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = true

# Remappings
remappings = [
    "forge-std/=lib/forge-std/src/",
]

# Testing
ffi = false
verbosity = 2
fuzz = { runs = 256 }

[profile.ci]
fuzz = { runs = 1000 }
